name: Trigger QA Tests On PR

on:
  pull_request:
    branches:
      - main
      - master
    types: [opened, synchronize, reopened]

jobs:
  ping-qa-repo:
    runs-on: ubuntu-latest
    steps:
      - name: Repository Dispatch
        uses: peter-evans/repository-dispatch@v3
        with:
          # Use the PAT token you saved in the Dev repo secrets
          token: ${{ secrets.QA_REPO_TOKEN }}
          # The format must be: owner/repository-name
          repository: SiddharthGupta25/demo-gh-qa 
          event-type: trigger-playwright-tests
          # Optional: Pass data from the PR to the QA repo if needed
          client-payload: '{"pr_number": "${{ github.event.pull_request.number }}", "sha": "${{ github.event.pull_request.head.sha }}"}'